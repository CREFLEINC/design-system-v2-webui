name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 잡 이름 'check' 가 그대로 status check 컨텍스트 이름이 된다 (branch protection 이 이 이름을 참조).
  check:
    runs-on: ubuntu-latest
    steps:
      # persist-credentials 기본값(true)은 체크아웃 로컬 config 에 http.https://github.com/.extraheader
      # (이 리포 전용 GITHUB_TOKEN Basic 헤더)를 남긴다. 이 헤더는 리포 루트 cwd 에서 실행되는 git 의
      # github.com 요청 전부에 우선 적용되어, 아래 verify 스텝이 insteadOf 로 주입하는 FOUNDATION_PAT 을
      # 무력화한다 — 무권한 GITHUB_TOKEN 이 전송되어 파운데이션(private) 접근이 404 로 실패한다
      # (PR #29 CI 실측, 이슈 #3 후속). 이 리포는 public 이라 아래 익명 git fetch 는 영향 없다. 끄지 말 것.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      # 파운데이션 repo 에 접근하지 않는다. lock 파일과 디스크만 대조한다.
      - run: npm run check
      # 이 스텝만 파운데이션 자격증명을 사용한다 — 위 npm run check 는 오프라인 불변으로 유지된다.
      # diff 근거: pull_request 체크아웃은 merge ref 이고 required check 가 strict 라
      # 병합 시점엔 base 가 최신임이 보장된다 — merge-base 계산 없이 두 트리를 직접 비교해도 된다.
      - name: 파운데이션 신뢰 루트 upstream 대조 (foundation 변경 PR 한정)
        if: github.event_name == 'pull_request'
        env:
          FOUNDATION_PAT: ${{ secrets.FOUNDATION_PAT }}
        run: |
          git fetch --quiet --depth 1 origin "${{ github.base_ref }}"
          if git diff --quiet FETCH_HEAD HEAD -- styles/foundation ds-bundle/fonts; then
            echo "foundation 변경 없음 — upstream 대조 생략"
            exit 0
          fi
          if [ -z "$FOUNDATION_PAT" ]; then
            echo "::error::FOUNDATION_PAT secret 이 없습니다 — foundation 변경 PR 은 upstream 대조가 필수입니다 (fork PR 에서는 불가: 관리자가 브랜치 PR 로 재생성하세요)."
            exit 1
          fi
          git config --global url."https://x-access-token:${FOUNDATION_PAT}@github.com/".insteadOf "https://github.com/"
          npm run check:foundation:verify
